name: Build Doom C0re

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix APT mirrors (avoid azure.archive timeouts)
        run: |
          # 1. Override the mirror list with a reliable global CDN
          echo 'http://archive.ubuntu.com/ubuntu' | sudo tee /etc/apt/apt-mirrors.txt
          # 2. Also fix any hardcoded azure references in sources.list
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' /etc/apt/sources.list 2>/dev/null || true
          # 3. Now update
          sudo apt-get update

      - name: Install build tools
        run: sudo apt-get install -y build-essential binutils

      - name: Build
        run: make

      - name: Verify outputs
        run: |
          ls -lah
          file doom.elf doom.bin
          wc -c doom.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Doom_C0re-build
          path: |
            doom.elf
            doom.bin
          if-no-files-found: error
