name: Build Doom C0re

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils

      - name: Build
        run: make

      - name: Verify outputs
        run: |
          ls -lah
          file Doom_C0re.elf Doom_emu.bin
          wc -c Doom_C0re.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Doom_C0re-build
          path: |
            Doom_C0re.elf
            Doom_C0re.bin
          if-no-files-found: error
